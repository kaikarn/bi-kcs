<body class="bg-slate-50 text-slate-900 overflow-hidden">

  { month: 'มิ.ย.', coffee: 0, mushroom: 0, total: 0, target: 9664038, online: 0, onlineTarget: 3700000, van: 0, vanTarget: 4047371, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'ก.ค.', coffee: 0, mushroom: 0, total: 0, target: 7791110, online: 0, onlineTarget: 3200000, van: 0, vanTarget: 2674444, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'ส.ค.', coffee: 0, mushroom: 0, total: 0, target: 7840494, online: 0, onlineTarget: 3300000, van: 0, vanTarget: 2623828, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'ก.ย.', coffee: 0, mushroom: 0, total: 0, target: 8715413, online: 0, onlineTarget: 3300000, van: 0, vanTarget: 3498746, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'ต.ค.', coffee: 0, mushroom: 0, total: 0, target: 8349293, online: 0, onlineTarget: 3300000, van: 0, vanTarget: 3132626, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'พ.ย.', coffee: 0, mushroom: 0, total: 0, target: 8960880, online: 0, onlineTarget: 3900000, van: 0, vanTarget: 3144214, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 },
  { month: 'ธ.ค.', coffee: 0, mushroom: 0, total: 0, target: 10870338, online: 0, onlineTarget: 3600000, van: 0, vanTarget: 5353671, mt: 0, mtTarget: 1166667, admin: 0, adminTarget: 8333, oem: 0, oemTarget: 500000, fried: 0, friedTarget: 241667, others: 0, othersTarget: 0 }
];

let currentSalesData = structuredClone(initialData);
let dataHistory = [structuredClone(initialData)];
let activeTab = 'sales_dashboard';
let charts = {};
let modalChart = null;

function formatM(val) {
  val = Number(val || 0);
  if (val === 0 || Number.isNaN(val)) return '-';
  return (val / 1000000).toFixed(2) + ' M';
}
function formatFull(val) {
  val = Number(val || 0);
  if (val === 0 || Number.isNaN(val)) return '-';
  return val.toLocaleString('th-TH', { maximumFractionDigits: 0 });
}
function calculateChange(curr, prev) {
  curr = Number(curr || 0); prev = Number(prev || 0);
  if (!prev) return 0;
  return ((curr - prev) / prev) * 100;
}
function sum(key, data = currentSalesData) { return data.reduce((s, m) => s + Number(m[key] || 0), 0); }
function q(selector) { return document.querySelector(selector); }
function byId(id) { return document.getElementById(id); }
function showToast(msg) {
  byId('toastMsg').textContent = msg;
  byId('toast').classList.remove('hidden');
  setTimeout(() => byId('toast').classList.add('hidden'), 2600);
}
function destroyCharts() { Object.values(charts).forEach(c => c && c.destroy && c.destroy()); charts = {}; }

function navItems() {
  return [
    { id: 'sales_dashboard', label: 'Dashboard', icon: '📊' },
    { id: 'target', label: 'เป้าปี 2569', icon: '🎯' },
    { id: 'online', label: 'ออนไลน์', icon: '🌐' },
    { id: 'vansales', label: 'หน่วยรถ', icon: '🚚' },
    { id: 'budget', label: 'งบประมาณ', icon: '💰' }
  ];
}
function renderNav() {
  byId('sideNav').innerHTML = navItems().map(item => `
    <button data-tab="${item.id}" class="nav-btn w-full flex flex-col items-center gap-1 p-2.5 rounded-xl transition-all ${activeTab === item.id ? 'nav-active font-bold' : 'text-gray-400 hover:bg-red-50 hover:text-red-600'}">
      <span class="text-lg">${item.icon}</span><span class="text-[9px] font-bold">${item.label}</span>
    </button>
  `).join('');
  document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); }));
}

function statCard(title, value, sub, icon = '📌', color = 'red', isText = false) {
  const colorClass = color === 'green' ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50';
  return `<div class="card p-3 flex flex-col justify-between hover:shadow-md transition-all h-full">
    <div class="flex justify-between items-start gap-2">
      <div class="min-w-0">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-wider truncate">${title}</div>
        <div class="text-xl font-black text-gray-900 my-0.5">${isText ? value : formatM(value)}</div>
      </div>
      <div class="p-1.5 rounded-lg ${colorClass}">${icon}</div>
    </div>
    <div class="text-[9px] text-gray-400 font-medium mt-1">${sub || ''}</div>
  </div>`;
}

function getFilteredData() {
  const period = byId('filterPeriod')?.value || 'มี.ค.';
  const product = byId('filterProduct')?.value || 'กาแฟ+เห็ด';
  const channel = byId('filterChannel')?.value || 'ทั้งหมด';

  let targetMonths;
  if (period === 'Q1') targetMonths = currentSalesData.slice(0, 3);
  else if (period === 'ปี 69') targetMonths = currentSalesData;
  else targetMonths = currentSalesData.filter(d => d.month === period);

  const idx = currentSalesData.findIndex(d => d.month === period);
  const compareMonths = idx > 0 ? [currentSalesData[idx - 1]] : [];

  function aggregate(months) {
    const ch = channelsDef.find(c => c.label === channel);
    return months.reduce((acc, d) => {
      let total = 0, coffee = 0, mushroom = 0, target = 0;
      if (!ch) {
        total = Number(d.total || 0); coffee = Number(d.coffee || 0); mushroom = Number(d.mushroom || 0); target = Number(d.target || 0);
      } else {
        total = Number(d[ch.key] || 0); target = Number(d[ch.target] || 0);
        coffee = total; mushroom = 0;
      }
      if (product === 'กาแฟ') total = coffee;
      if (product === 'เห็ด') total = mushroom;
      acc.total += total; acc.coffee += coffee; acc.mushroom += mushroom; acc.target += target;
      return acc;
    }, { total:0, coffee:0, mushroom:0, target:0 });
  }

  return { period, product, channel, now: aggregate(targetMonths), before: aggregate(compareMonths) };
}

function renderFilters() {
  const months = currentSalesData.map(m => m.month).map(m => `<option>${m}</option>`).join('');
  return `<div class="sticky top-0 z-40 bg-slate-50/95 backdrop-blur-sm py-3 px-1 border-b border-gray-100 flex flex-col md:flex-row gap-3 md:items-center md:justify-between shadow-sm -mx-1">

      <div class="w-px h-4 bg-gray-200"></div>
      <select id="filterProduct" class="bg-transparent text-[11px] font-bold text-gray-600 outline-none px-2 cursor-pointer"><option>กาแฟ+เห็ด</option><option>กาแฟ</option><option>เห็ด</option></select>
      <div class="w-px h-4 bg-gray-200"></div>
      <select id="filterChannel" class="bg-transparent text-[11px] font-bold text-gray-600 outline-none px-2 cursor-pointer"><option>ทั้งหมด</option>${channelsDef.map(c => `<option>${c.label}</option>`).join('')}</select>
    </div>
    <button id="quickExportBtn" class="flex items-center gap-1.5 px-3 py-2 bg-green-600 text-white rounded-xl text-[10px] font-bold shadow-lg hover:bg-green-700 transition-all w-fit">📄 Export CSV</button>
  </div>`;
}

        <div class="card p-4 cursor-zoom-in" data-modal="share"><h4 class="text-xs font-black text-red-600 mb-4 uppercase tracking-wide flex justify-between">Market Share <span>⛶</span></h4><div class="chart-box"><canvas id="shareChart"></canvas></div></div>

        <div class="card overflow-hidden"><div class="bg-gray-800 p-3 text-white text-[11px] font-black uppercase flex justify-between items-center">วิเคราะห์รายสินค้า (M) <button class="hover:scale-110" data-modal="productTable">⛶</button></div>${renderProductTable(false)}</div>
      </div>
      ${renderExecutiveInsight()}
    </div>`;

  bindFilterEvents();
  updateDynamicKpis();
  drawCharts();

}

function bindFilterEvents() {
  ['filterPeriod','filterProduct','filterChannel'].forEach(id => byId(id).addEventListener('change', () => { updateDynamicKpis(); drawCharts(); }));
  byId('quickExportBtn').addEventListener('click', exportCSV);
}

function updateDynamicKpis() {
  const f = getFilteredData();
  const growth = calculateChange(f.now.total, f.before.total);
  byId('dynamicKpis').innerHTML = `
    ${statCard(`ยอดขาย ${f.period}`, f.now.total, f.channel, '🛒')}
    ${statCard(`กาแฟ (${f.period})`, f.now.coffee, f.channel, '☕')}
    ${statCard(`เห็ด (${f.period})`, f.now.mushroom, f.channel, '🍄')}
    ${statCard(`เป้า (${f.period})`, f.now.target, `${growth >= 0 ? '+' : ''}${growth.toFixed(1)}% MoM`, '🎯')}
  `;
}

function renderExecutiveInsight() {
  return `<div class="card p-6 space-y-4 group relative overflow-hidden">

}
function insightHtml() {
  const f = getFilteredData();
  const achievement = (f.now.total / (f.now.target || 1)) * 100;
  const growth = calculateChange(f.now.total, f.before.total);
  return `<div class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest">การวิเคราะห์ผลการดำเนินงาน</p>

        </div>

        </ul>
      </div>
    </div>
  </div>`;
}

function renderChannelTable(isFull) {
  const size = isFull ? 'text-sm' : 'text-[11px]';
  const headerMonths = currentSalesData.map(m => `<th class="p-3 text-center">${m.month}</th>`).join('');
  const rows = channelsDef.map(ch => `<tr class="hover:bg-red-50 transition-colors">
    <td class="p-3 font-bold text-gray-800 table-sticky-left bg-white border-r">${ch.label}</td>
    ${currentSalesData.map(m => `<td class="p-3 text-center">${formatM(m[ch.key] || 0)}</td>`).join('')}
    <td class="p-3 text-center font-bold text-red-600 table-sticky-right bg-white border-l">${formatM(sum(ch.key))}</td>
  </tr>`).join('');
  const totalRow = `<tr class="bg-red-50 font-black border-t-2 border-red-200"><td class="p-3 text-red-700 table-sticky-left bg-red-50 border-r uppercase text-[10px]">สรุปรวมทั้งหมด</td>${currentSalesData.map(m => `<td class="p-3 text-center text-red-700">${formatM(m.total)}</td>`).join('')}<td class="p-3 text-center text-red-700 table-sticky-right bg-red-50 border-l">${formatM(sum('total'))}</td></tr>`;
  return `<div class="overflow-x-auto w-full"><table class="${size} w-full text-left border-collapse"><thead class="bg-gray-50 border-b"><tr><th class="p-3 font-bold table-sticky-left bg-gray-50 border-r">ช่องทางการขาย</th>${headerMonths}<th class="p-3 text-center text-red-600 font-bold table-sticky-right bg-gray-50 border-l">รวมปี 69</th></tr></thead><tbody class="divide-y divide-gray-100">${rows}${totalRow}</tbody></table></div>`;
}
function renderProductTable(isFull) {
  const coffeeTotal = sum('coffee');
  const mushroomTotal = sum('mushroom');
  const totalSum = sum('total');
  const size = isFull ? 'text-sm' : 'text-[11px]';
  let table = `<div class="overflow-x-auto w-full"><table class="${size} w-full text-left border-collapse"><thead class="bg-gray-50 border-b"><tr><th class="p-3 font-bold table-sticky-left bg-gray-50 border-r">ประเภทสินค้า</th>${currentSalesData.map(m => `<th class="p-3 text-center">${m.month}</th>`).join('')}<th class="p-3 text-center text-red-600 font-bold table-sticky-right bg-gray-50 border-l">รวมสะสม</th></tr></thead><tbody class="divide-y divide-gray-100">
    <tr class="hover:bg-red-50"><td class="p-3 font-bold text-gray-800 table-sticky-left bg-white border-r">☕ กาแฟ</td>${currentSalesData.map(m => `<td class="p-3 text-center">${formatM(m.coffee)}</td>`).join('')}<td class="p-3 text-center font-bold text-red-600 table-sticky-right bg-white border-l">${formatM(coffeeTotal)}</td></tr>
    <tr class="hover:bg-red-50"><td class="p-3 font-bold text-gray-800 table-sticky-left bg-white border-r">🍄 เห็ดทอด</td>${currentSalesData.map(m => `<td class="p-3 text-center">${formatM(m.mushroom)}</td>`).join('')}<td class="p-3 text-center font-bold text-red-600 table-sticky-right bg-white border-l">${formatM(mushroomTotal)}</td></tr>
    <tr class="bg-gray-800 text-white font-black"><td class="p-3 uppercase text-[10px] table-sticky-left bg-gray-800 border-r">📊 สรุปรวมรายสินค้า</td>${currentSalesData.map(m => `<td class="p-3 text-center text-red-300">${formatM(m.total)}</td>`).join('')}<td class="p-3 text-center text-red-400 table-sticky-right bg-gray-800 border-l">${formatM(totalSum)}</td></tr>
  </tbody></table></div>`;
  if (isFull) {
    table += `<div class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2 bg-gray-50 p-6 rounded-3xl border border-gray-100"><h4 class="text-xs font-black text-gray-900 mb-6 uppercase tracking-widest">📈 แนวโน้มยอดขายเปรียบเทียบ</h4><div class="chart-box"><canvas id="productTrendModal"></canvas></div></div><div class="bg-red-600 p-6 rounded-3xl text-white shadow-lg"><p class="text-[10px] font-bold uppercase opacity-80">Dominant Product</p><h3 class="text-2xl font-black mt-4">☕ กาแฟ</h3><p class="text-xs mt-2 opacity-90 leading-relaxed font-medium">ครองสัดส่วนรายได้หลัก ${((coffeeTotal/(totalSum||1))*100).toFixed(1)}% ของยอดขายสะสม</p></div></div>`;
  }
  return table;
}

function renderTargetView() {
  const totalActual = sum('total');
  const totalTarget = 100000000;
  const progressPercent = (totalActual / totalTarget) * 100;
  const quarters = [
    { name:'Q1', actual: currentSalesData.slice(0,3).reduce((s,m)=>s+m.total,0), target:22113312 },
    { name:'Q2', actual: currentSalesData.slice(3,6).reduce((s,m)=>s+m.total,0), target:25359159 },
    { name:'Q3', actual: currentSalesData.slice(6,9).reduce((s,m)=>s+m.total,0), target:24347018 },
    { name:'Q4', actual: currentSalesData.slice(9,12).reduce((s,m)=>s+m.total,0), target:28180511 }
  ];
  byId('app').innerHTML = `<div class="space-y-6 pb-10">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">${statCard('เป้าหมายรายปี', totalTarget, 'Target Goal 2026', '🎯')}${statCard('ยอดขายจริงสะสม', totalActual, 'Actual Sales YTD', '📈', 'green')}${statCard('Achievement', progressPercent.toFixed(2)+'%', 'vs 100M Target', '⚡', 'red', true)}${statCard('เป้าคงเหลือ', totalTarget-totalActual, 'Remaining to Goal', '💰')}</div>
    <div class="card overflow-hidden"><div class="bg-red-600 p-4 text-white flex justify-between items-center"><h4 class="text-xs font-black uppercase tracking-widest">เป้ารวมรายไตรมาส</h4><span class="text-[10px] font-bold bg-white/20 px-3 py-1 rounded-full uppercase">KCS Quarter Map</span></div><div class="overflow-x-auto"><table class="w-full text-left border-collapse text-[12px]"><thead><tr class="bg-gray-50 border-b"><th class="p-4 font-black text-gray-500 uppercase">ไตรมาส</th><th class="p-4 font-black text-gray-500 uppercase text-center">ยอดจริง</th><th class="p-4 font-black text-gray-500 uppercase text-center">เป้าหมาย</th><th class="p-4 font-black text-gray-500 uppercase text-center">Achievement</th></tr></thead><tbody class="divide-y divide-gray-50">${quarters.map(q => `<tr><td class="p-4 font-black text-gray-800">${q.name}</td><td class="p-4 text-center font-bold">${formatFull(q.actual)}</td><td class="p-4 text-center font-bold text-gray-400">${formatFull(q.target)}</td><td class="p-4 text-center font-black ${q.actual >= q.target && q.actual > 0 ? 'text-green-600':'text-red-600'}">${q.actual ? ((q.actual/q.target)*100).toFixed(1)+'%' : '-'}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="card overflow-hidden"><div class="bg-gray-800 p-4 text-white"><h4 class="text-xs font-black uppercase tracking-widest">แผนงานช่องทาง: เป้าหมาย vs ยอดจริง รายเดือน</h4></div>${renderMonthlyTargetTable()}</div>
  </div>`;
}
function renderMonthlyTargetTable() {
  return `<div class="overflow-x-auto"><table class="w-full text-left border-collapse text-[10px]"><thead><tr class="bg-gray-50 border-b"><th class="p-3 font-black text-gray-500 uppercase table-sticky-left bg-gray-50 border-r min-w-[70px]">เดือน</th>${channelsDef.map(ch => `<th class="p-3 font-black text-gray-600 uppercase text-center border-l">${ch.label}<div class="text-[8px] font-normal mt-1"><span class="text-gray-900 font-bold">จริง</span> / <span class="text-gray-400">เป้า</span></div></th>`).join('')}<th class="p-3 font-black text-red-600 uppercase text-center border-l bg-red-50 table-sticky-right min-w-[90px]">รวมเป้า</th></tr></thead><tbody class="divide-y divide-gray-50">${currentSalesData.map(m => `<tr class="hover:bg-red-50/10"><td class="p-3 font-black text-gray-800 table-sticky-left bg-white border-r">${m.month}</td>${channelsDef.map(ch => { const actual=m[ch.key]||0; const target=m[ch.target]||0; const met=actual>=target && actual>0; return `<td class="p-3 text-center border-l"><div class="font-black ${met?'text-green-600':'text-gray-900'}">${formatFull(actual)}</div><div class="text-[9px] text-gray-400 font-medium">${formatFull(target)}</div></td>`; }).join('')}<td class="p-3 text-center font-black text-red-700 bg-red-50 table-sticky-right border-l"><div class="${m.total >= m.target && m.total>0?'text-green-700':''}">${formatFull(m.total)}</div><div class="text-[9px] text-red-300 font-medium">${formatFull(m.target)}</div></td></tr>`).join('')}</tbody></table></div>`;
}

function renderPlaceholder(tab) {
  byId('app').innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-white rounded-3xl border border-dashed border-gray-200 opacity-70"><div class="text-5xl mb-4">ℹ️</div><h3 class="font-bold text-gray-400 uppercase tracking-widest">Section: ${tab}</h3><p class="text-gray-400 text-xs font-medium">ส่วนนี้กำลังรอการพัฒนาเพิ่มเติม</p></div>`;
}

function drawCharts() {
  destroyCharts();
  const f = getFilteredData();
  const trendData = currentSalesData.map(m => {
    const ch = channelsDef.find(c => c.label === f.channel);
    let val;
    if (!ch) val = f.product === 'กาแฟ' ? m.coffee : f.product === 'เห็ด' ? m.mushroom : m.total;
    else val = m[ch.key] || 0;
    return val;
  });
  let periodData;
  if (f.period === 'Q1') periodData = currentSalesData.slice(0,3);
  else if (f.period === 'ปี 69') periodData = currentSalesData;
  else periodData = currentSalesData.filter(d => d.month === f.period);
  const share = channelsDef.map(ch => ({ label: ch.label, value: periodData.reduce((s,d)=>s+(d[ch.key]||0),0) })).filter(x => x.value > 0);

  if (byId('yearlyChart')) charts.yearly = new Chart(byId('yearlyChart'), yearlyConfig());
  if (byId('trendChart')) charts.trend = new Chart(byId('trendChart'), lineConfig(currentSalesData.map(m=>m.month), trendData, 'ยอดขาย'));
  if (byId('shareChart')) charts.share = new Chart(byId('shareChart'), doughnutConfig(share.map(x=>x.label), share.map(x=>x.value)));
  const insight = byId('insightContent'); if (insight) insight.innerHTML = insightHtml();
}
function yearlyConfig() {
  return { type:'bar', data:{ labels:['ปี 68','ปี 69','เป้าหมาย'], datasets:[{ data:[55720000, sum('total'), 100000000], backgroundColor:['#FEB2B2', PRIMARY_RED, DARK_RED], borderRadius:8 }] }, options: baseChartOptions(true) };
}
function lineConfig(labels, data, label) {
  return { type:'line', data:{ labels, datasets:[{ label, data, borderColor:PRIMARY_RED, backgroundColor:'rgba(229,62,62,.12)', fill:true, tension:.35, pointRadius:4 }] }, options: baseChartOptions(false) };
}
function doughnutConfig(labels, data) {
  return { type:'doughnut', data:{ labels, datasets:[{ data, backgroundColor:[PRIMARY_RED,'#F56565','#FEB2B2','#CBD5E0','#FC8181','#A0AEC0','#718096'], borderWidth:3, borderColor:'#fff' }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{ family:'Sarabun', size:10 } } }, tooltip:{ callbacks:{ label: ctx => `${ctx.label}: ${formatM(ctx.raw)}` } } } } };
}
function baseChartOptions(hideLegend) {
  return { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:!hideLegend, labels:{ font:{ family:'Sarabun' } } }, tooltip:{ callbacks:{ label: ctx => formatFull(ctx.raw) } } }, scales:{ y:{ beginAtZero:true, ticks:{ callback:v => (v/1000000)+'M' }, grid:{ color:'#F1F5F9' } }, x:{ grid:{ display:false } } } };
}

function bindModalButtons() {
  document.querySelectorAll('[data-modal]').forEach(el => el.addEventListener('click', e => { e.stopPropagation(); openModal(el.dataset.modal); }));
}
function openModal(type) {
  const titleMap = { yearly:'ยอดขายรายปี 2568 vs 2569', trend:'แนวโน้มยอดขายรายเดือน 2569', share:'ส่วนแบ่งช่องทางรายได้', channelTable:'ตารางยอดขายรายเดือนแยกช่องทาง', productTable:'วิเคราะห์รายประเภทสินค้า', executive:'บทวิเคราะห์บริหารงานเชิงลึก' };
  byId('modalTitle').textContent = titleMap[type] || 'ขยายข้อมูล';
  const f = getFilteredData();
  byId('modalSub').textContent = `ตัวกรอง: ${f.period} | ${f.product} | ${f.channel}`;
  const content = byId('modalContent');
  if (modalChart) { modalChart.destroy(); modalChart = null; }
  content.innerHTML = '';
  if (type === 'channelTable') content.innerHTML = renderChannelTable(true);
  else if (type === 'productTable') { content.innerHTML = renderProductTable(true); setTimeout(() => { if (byId('productTrendModal')) modalChart = new Chart(byId('productTrendModal'), { type:'line', data:{ labels:currentSalesData.map(m=>m.month), datasets:[{ label:'กาแฟ', data:currentSalesData.map(m=>m.coffee), borderColor:PRIMARY_RED, tension:.35 },{ label:'เห็ดทอด', data:currentSalesData.map(m=>m.mushroom), borderColor:'#4A5568', borderDash:[5,5], tension:.35 }] }, options:baseChartOptions(false) }); }, 0); }
  else if (type === 'executive') content.innerHTML = `<div class="max-w-4xl mx-auto space-y-10 py-10"><div class="text-center space-y-2"><h2 class="text-2xl font-black text-gray-900 uppercase">KCS Analytics Summary</h2><p class="text-gray-500">สำหรับงวด: ${f.period}</p></div>${insightHtml()}<div class="bg-gray-50 p-10 rounded-[40px] border-l-8 border-red-600 border-r border-t border-b border-gray-200"><h4 class="font-black text-lg mb-4">💡 Deep Dive Analysis</h4><p class="text-gray-600 leading-loose">จากการวิเคราะห์ข้อมูลสะสมรายไตรมาสพบว่า สินค้ากลุ่มกาแฟยังคงเป็นตัวขับเคลื่อนหลักที่รักษาระดับการเติบโตได้เสถียรที่สุด โดยเฉพาะช่องทางออนไลน์ที่มี Momentum สูง แนะนำให้เพิ่มกิจกรรม Bundle และ Affiliate เพื่อเร่งยอดในเดือนถัดไป</p></div></div>`;
  else {
    content.innerHTML = `<div class="h-full min-h-[500px]"><canvas id="modalCanvas"></canvas></div>`;
    const canvas = byId('modalCanvas');
    if (type === 'yearly') modalChart = new Chart(canvas, yearlyConfig());
    if (type === 'trend') {
      const ch = channelsDef.find(c => c.label === f.channel);
      const data = currentSalesData.map(m => !ch ? (f.product === 'กาแฟ' ? m.coffee : f.product === 'เห็ด' ? m.mushroom : m.total) : m[ch.key] || 0);
      modalChart = new Chart(canvas, lineConfig(currentSalesData.map(m=>m.month), data, 'ยอดขาย'));
    }
    if (type === 'share') {
      let periodData = f.period === 'Q1' ? currentSalesData.slice(0,3) : f.period === 'ปี 69' ? currentSalesData : currentSalesData.filter(d=>d.month===f.period);
      const share = channelsDef.map(ch => ({ label: ch.label, value: periodData.reduce((s,d)=>s+(d[ch.key]||0),0) })).filter(x => x.value > 0);
      modalChart = new Chart(canvas, doughnutConfig(share.map(x=>x.label), share.map(x=>x.value)));
    }
  }
  byId('chartModal').classList.add('show');
}
function closeModal() { byId('chartModal').classList.remove('show'); if (modalChart) { modalChart.destroy(); modalChart = null; } }

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', quote = false;
  for (let i=0; i<text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && quote && next === '"') { cell += '"'; i++; }
    else if (ch === '"') quote = !quote;
    else if (ch === ',' && !quote) { row.push(cell.trim()); cell = ''; }
    else if ((ch === '\n' || ch === '\r') && !quote) {
      if (cell || row.length) { row.push(cell.trim()); rows.push(row); row = []; cell = ''; }
      if (ch === '\r' && next === '\n') i++;
    } else cell += ch;
  }
  if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
  return rows.filter(r => r.some(c => c !== ''));
}
function handleFileUpload(event) {
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  dataHistory.unshift(structuredClone(currentSalesData));
  dataHistory = dataHistory.slice(0,10);
  byId('undoBtn').classList.remove('hidden');
  byId('undoBtn').classList.add('flex');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const name = files[0].name.toLowerCase();
      if (name.endsWith('.csv')) {
        const rows = parseCSV(String(e.target.result || ''));
        applyRows(rows);
      } else if (window.XLSX) {
        const wb = XLSX.read(e.target.result, { type:'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        applyRows(XLSX.utils.sheet_to_json(ws, { header:1 }));
      }
      addHistory(files.length);
      showToast('อัปโหลดข้อมูลเรียบร้อย');
      render();
    } catch (err) {
      alert('อ่านไฟล์ไม่สำเร็จ: ' + err.message);
    }
  };
  if (files[0].name.toLowerCase().endsWith('.csv')) reader.readAsText(files[0], 'UTF-8'); else reader.readAsArrayBuffer(files[0]);
}
function applyRows(rows) {
  if (!rows || rows.length < 2) return;
  const headers = rows[0].map(h => String(h || '').trim().toLowerCase());
  // รองรับหัวคอลัมน์พื้นฐาน: month,total,coffee,mushroom,online,van,mt,admin,oem,fried,others,target
  rows.slice(1).forEach(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i]);
    const monthName = obj.month || obj['เดือน'];
    if (!monthName) return;
    const idx = currentSalesData.findIndex(m => m.month === monthName || m.month.replace('.', '') === String(monthName).replace('.', ''));
    if (idx < 0) return;
    ['total','coffee','mushroom','online','van','mt','admin','oem','fried','others','target','onlineTarget','vanTarget','mtTarget','adminTarget','oemTarget','friedTarget','othersTarget'].forEach(k => {
      const keyLower = k.toLowerCase();
      if (obj[keyLower] !== undefined && obj[keyLower] !== '') currentSalesData[idx][k] = Number(String(obj[keyLower]).replace(/,/g,'')) || 0;
    });
  });
}
function addHistory(count) {
  const hist = byId('uploadHistory');
  if (hist.textContent.includes('ยังไม่มีข้อมูล')) hist.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'bg-white p-1.5 rounded border border-gray-100 text-[8px] text-gray-500';
  div.textContent = `${new Date().toLocaleString('th-TH')} (${count} ไฟล์)`;
  hist.prepend(div);
}
function handleUndo() {
  if (!dataHistory.length) return;
  currentSalesData = structuredClone(dataHistory.shift());
  if (!dataHistory.length) { byId('undoBtn').classList.add('hidden'); byId('undoBtn').classList.remove('flex'); }
  showToast('ย้อนกลับข้อมูลเรียบร้อย');
  render();
}
function exportCSV() {
  const header = ['month','total','coffee','mushroom','online','van','mt','admin','oem','fried','others','target'];
  const csv = [header.join(',')].concat(currentSalesData.map(m => header.map(h => m[h] || 0).join(','))).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'KCS_Intelligence_Report.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('ส่งออก CSV สำเร็จ');
}

function render() {
  renderNav();
  destroyCharts();
  if (activeTab === 'sales_dashboard') renderSalesDashboard();
  else if (activeTab === 'target') renderTargetView();
  else renderPlaceholder(activeTab);
}

document.addEventListener('DOMContentLoaded', () => {
  byId('csvInput').addEventListener('change', handleFileUpload);
  byId('exportBtn').addEventListener('click', exportCSV);
  byId('undoBtn').addEventListener('click', handleUndo);
  byId('closeModal').addEventListener('click', closeModal);
  byId('chartModal').addEventListener('click', e => { if (e.target.id === 'chartModal') closeModal(); });
  render();
});
</script>
