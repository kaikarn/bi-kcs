<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCS Intelligence 2026 - Sunshine Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; letter-spacing: -0.01em; background-color: #F8FAFC; color: #020617; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #E53E3E; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        
        /* Table Flat Design */
        table { border-radius: 0 !important; border-collapse: collapse !important; width: 100%; border: 1px solid #CBD5E0; }
        th, td { border-radius: 0 !important; border: 1px solid #E2E8F0; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 30; border-right: 1px solid #CBD5E0; }
        .sticky-right { position: sticky; right: 0; background: white; z-index: 30; border-left: 1px solid #CBD5E0; }
        
        .nav-btn.active { background-color: #E53E3E; color: white; box-shadow: 0 10px 15px -3px rgba(229, 62, 62, 0.3); font-weight: bold; transform: scale(1.02); }
        .progress-bar-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .full-table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #CBD5E0; border-radius: 0; }
        .full-table-container table { min-width: 1400px; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen w-full">
        <!-- Sidebar -->
        <aside class="w-40 bg-white border-r border-red-100 flex flex-col shadow-sm z-40">
            <div class="p-6 flex flex-col items-center gap-2 border-b border-red-50">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg cursor-pointer">K</div>
                <span class="font-black text-[12px] text-red-600 mt-1 uppercase text-center leading-tight tracking-tighter">KCS Analytics</span>
            </div>
            <nav class="flex-1 p-3 space-y-2 mt-4 overflow-y-auto custom-scrollbar">
                <button onclick="switchTab('sales_dashboard')" id="btn-sales_dashboard" class="nav-btn w-full flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all text-gray-400">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Dashboard</span>
                </button>
                <button onclick="switchTab('target')" id="btn-target" class="nav-btn w-full flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all text-gray-400">
                    <i data-lucide="target" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">เป้าปี 2569</span>
                </button>
                <div class="h-px bg-gray-100 mx-2 my-2"></div>
                <button onclick="switchTab('online')" id="btn-online" class="nav-btn w-full flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all text-gray-400">
                    <i data-lucide="globe" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">ออนไลน์</span>
                </button>
                <button onclick="switchTab('vansales')" id="btn-vansales" class="nav-btn w-full flex flex-col items-center gap-1.5 p-3 rounded-2xl transition-all text-gray-400">
                    <i data-lucide="truck" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">หน่วยรถ</span>
                </button>
            </nav>
            <div class="p-4 bg-gray-50 border-t border-red-50 text-[10px] space-y-3">
                <div class="font-black text-gray-400 uppercase flex items-center gap-2"><i data-lucide="clock" class="w-3 h-3"></i> ประวัติอัปเดต</div>
                <div id="history-list" class="max-h-40 overflow-y-auto space-y-2 pr-1 italic text-gray-300 text-[9px]">ยังไม่มีข้อมูล</div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header class="bg-white border-b border-red-100 px-6 py-4 flex items-center justify-between shadow-sm sticky top-0 z-50 h-[64px]">
                <div class="flex items-center gap-4">
                    <h2 class="text-sm font-black border-l-4 border-red-600 pl-3 uppercase tracking-tighter text-slate-800">Intelligence Workspace</h2>
                </div>
                <div class="flex gap-3">
                    <button onclick="resetData()" class="flex items-center gap-2 px-4 py-2 bg-gray-50 text-gray-600 rounded-xl text-[11px] font-bold hover:bg-gray-100 border border-gray-200 transition-all">
                        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> คืนค่าเริ่มต้น
                    </button>
                    <label class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-xl text-[11px] font-bold hover:bg-red-700 cursor-pointer shadow-lg active:scale-95 transition-all">
                        <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i> อัปโหลดไฟล์ (CSV)
                        <input type="file" id="upload-input" multiple accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                </div>
            </header>

            <main id="main-content" class="flex-1 overflow-y-auto p-6 bg-[#F8FAFC] custom-scrollbar"></main>

            <!-- Modal Overlay -->
            <div id="modal-overlay" class="hidden fixed inset-0 bottom-0 top-[65px] left-40 right-0 z-[100] flex bg-slate-950/40 backdrop-blur-sm overflow-hidden">
                <div class="bg-white w-full h-full flex flex-col shadow-2xl relative border-t border-slate-200">
                    <div class="p-5 border-b flex justify-between items-center bg-white shadow-sm z-10">
                        <div class="flex flex-col">
                            <h3 id="modal-title" class="text-2xl font-black text-slate-950 uppercase tracking-tight flex items-center gap-3"></h3>
                            <p id="modal-subtitle" class="text-xs font-black text-red-500 mt-1 uppercase tracking-widest bg-red-50 px-3 py-1 rounded-lg w-fit"></p>
                        </div>
                        <button onclick="closeModal()" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-2xl transition-all"><i data-lucide="x" class="w-6 h-6 text-slate-600"></i></button>
                    </div>
                    <div id="modal-body" class="flex-1 p-10 overflow-auto bg-white custom-scrollbar scroll-smooth"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-10 right-10 z-[110] transition-all transform duration-500 translate-y-20 opacity-0">
        <div id="toast-bg" class="flex items-center gap-5 px-8 py-5 bg-green-600 border-green-400 text-white rounded-[30px] shadow-2xl border-2">
            <div class="bg-white/20 p-2 rounded-full"><i data-lucide="check" class="w-5 h-5 text-white"></i></div>
            <div class="flex flex-col"><span id="toast-title" class="font-black uppercase tracking-wider text-xs">SUCCESS</span><span id="toast-msg" class="text-[11px] font-medium opacity-95 text-white">จัดการข้อมูลเรียบร้อย</span></div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & UTILS ---
        const PRIMARY_RED = "#E53E3E";
        const DARK_RED = "#9B2C2C";
        window.myCharts = {};

        function formatM(v) { return (v === 0 || !v || isNaN(v)) ? "-" : (v / 1000000).toFixed(2) + ' M'; }
        function formatFull(v) { return (v === 0 || v === null || isNaN(v)) ? "-" : v.toLocaleString('th-TH'); }

        const monthMap = { 'มกราคม': 'ม.ค.', 'กุมภาพันธ์': 'ก.พ.', 'มีนาคม': 'มี.ค.', 'เมษายน': 'เม.ย.', 'พฤษภาคม': 'พ.ค.', 'มิถุนายน': 'มิ.ย.', 'กรกฎาคม': 'ก.ค.', 'สิงหาคม': 'ส.ค.', 'กันยายน': 'ก.ย.', 'ตุลาคม': 'ต.ค.', 'พฤศจิกายน': 'พ.ย.', 'ธันวาคม': 'ธ.ค.' };
        const colMappings = { 'total': ['ยอดขายรวม', 'ยอดรวม', 'total', 'grand total', 'ทำได้ทั้งหมด'], 'coffee': ['กาแฟ', 'coffee', 'ยอดกาแฟ'], 'mushroom': ['เห็ดทอด', 'mushroom', 'ยอดขายเห็ด'], 'online': ['ออนไลน์', 'online'], 'van': ['หน่วยรถ', 'van', 'vansales'], 'mt': ['mt', 'consign'], 'oem': ['oem'], 'fried': ['บ.เห็ดทอดนาโหนด', 'snack'], 'admin': ['admin'], 'others': ['กาแฟอื่นๆ', 'others'] };
        const channelsDef = [ 
            { id: 'online', label: 'ออนไลน์', key: 'online', target: 'onlineTarget' }, 
            { id: 'vansales', label: 'หน่วยรถ', key: 'van', target: 'vanTarget' }, 
            { id: 'mt_consign', label: 'MT & Consign', key: 'mt', target: 'mtTarget' }, 
            { id: 'admin', label: 'Admin', key: 'admin', target: 'adminTarget' }, 
            { id: 'oem', label: 'OEM', key: 'oem', target: 'oemTarget' }, 
            { id: 'mushroom', label: 'บ.เห็ดทอดนาโหนด', key: 'fried', target: 'friedTarget' }, 
            { id: 'others', label: 'กาแฟอื่นๆ', key: 'others', target: 'othersTarget' } 
        ];

        // --- 2. INITIAL DATA (CORRECTED Jan-Apr 2026) ---
        let salesData = [
            { month: 'ม.ค.', total: 6394755, coffee: 5885537, mushroom: 509218, target: 6629562, online: 3039888, onlineCoffee: 2987897, onlineMushroom: 51991, onlineTarget: 2800000, van: 1916788, vanCoffee: 1786848, vanMushroom: 129940, vanTarget: 1912896, mt: 272428, mtTarget: 1166667, admin: 175100, adminTarget: 8333, oem: 462240, oemTarget: 500000, fried: 327287, friedTarget: 241667, others: 201025, othersTarget: 0 },
            { month: 'ก.พ.', total: 7603872, coffee: 7164296, mushroom: 439576, target: 7959692, online: 4498428, onlineCoffee: 4445135, onlineMushroom: 53293, onlineTarget: 3100000, van: 1899181, vanCoffee: 1759488, vanMushroom: 139693, vanTarget: 2943025, mt: 296728, mtTarget: 1166667, admin: 31888, adminTarget: 8333, oem: 407724, oemTarget: 500000, fried: 246590, friedTarget: 241667, others: 223333, othersTarget: 0 },
            { month: 'มี.ค.', total: 7770668, coffee: 7274443, mushroom: 496225, target: 7524058, online: 4759281, onlineCoffee: 4686860, onlineMushroom: 72421, onlineTarget: 3400000, van: 1726210, vanCoffee: 1587774, vanMushroom: 138436, vanTarget: 2207391, mt: 464555, mtTarget: 1166667, admin: 29950, adminTarget: 8333, oem: 348483, oemTarget: 500000, fried: 285367, friedTarget: 241667, others: 156822, othersTarget: 0 },
            { month: 'เม.ย.', total: 8190115, coffee: 7639767, mushroom: 550348, target: 7833863, online: 3626141, onlineCoffee: 3558913, onlineMushroom: 67228, onlineTarget: 3100000, van: 2661961, vanCoffee: 2487403, vanMushroom: 174558, vanTarget: 2817196, mt: 594416, mtTarget: 1166667, admin: 6740, adminTarget: 8333, oem: 697270, oemTarget: 500000, fried: 308562, friedTarget: 241667, others: 295026, othersTarget: 0 },
            { month: 'พ.ค.', total: 0, target: 7861259, onlineTarget: 3300000, vanTarget: 2644592, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'มิ.ย.', total: 0, target: 9664038, onlineTarget: 3700000, vanTarget: 4047371, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'ก.ค.', total: 0, target: 7791110, onlineTarget: 3200000, vanTarget: 2674444, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'ส.ค.', total: 0, target: 7840494, onlineTarget: 3300000, vanTarget: 2623828, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'ก.ย.', total: 0, target: 8715413, onlineTarget: 3300000, vanTarget: 3498746, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'ต.ค.', total: 0, target: 8349293, onlineTarget: 3300000, vanTarget: 3132626, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'พ.ย.', total: 0, target: 8960880, onlineTarget: 3900000, vanTarget: 3144214, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 },
            { month: 'ธ.ค.', total: 0, target: 10870338, onlineTarget: 3600000, vanTarget: 5353671, mtTarget: 1166667, oemTarget: 500000, friedTarget: 241667, adminTarget: 8333 }
        ];

        let state = {
            activeTab: 'sales_dashboard',
            filterPeriod: 'เม.ย.',
            filterProduct: 'กาแฟ+เห็ด',
            filterChannel: 'ทั้งหมด'
        };

        // --- 3. LOGIC FUNCTIONS ---
        function getFilteredStats() {
            let months = [];
            if (state.filterPeriod === 'ปี 69') months = salesData;
            else if (state.filterPeriod === 'Q1') months = salesData.slice(0, 3);
            else months = salesData.filter(d => d.month === state.filterPeriod);

            const ch = channelsDef.find(c => c.label === state.filterChannel);
            
            return months.reduce((acc, d) => {
                let t = ch ? (d[ch.key] || 0) : d.total; 
                let cf = 0, ms = 0, tg = ch ? (d[ch.target] || 0) : d.target;

                if (ch) {
                    if (ch.key === 'online') { cf = d.onlineCoffee || 0; ms = d.onlineMushroom || 0; }
                    else if (ch.key === 'van') { cf = d.vanCoffee || 0; ms = d.vanMushroom || 0; }
                    else if (ch.key === 'fried') { cf = 0; ms = d.fried || 0; }
                    else if (['mt', 'admin', 'oem', 'others'].includes(ch.key)) { cf = d[ch.key] || 0; ms = 0; }
                } else {
                    cf = d.coffee || 0; ms = d.mushroom || 0;
                }

                if (state.filterProduct === 'กาแฟ') t = cf;
                if (state.filterProduct === 'เห็ด') t = ms;

                return { total: acc.total + t, coffee: acc.coffee + cf, mushroom: acc.mushroom + ms, target: acc.target + tg };
            }, { total: 0, coffee: 0, mushroom: 0, target: 0 });
        }

        function getMarketShareData() {
            let periodData = [];
            if (state.filterPeriod === 'ปี 69') periodData = salesData;
            else if (state.filterPeriod === 'Q1') periodData = salesData.slice(0, 3);
            else periodData = salesData.filter(d => d.month === state.filterPeriod);

            if (periodData.length === 0) return [];
            return channelsDef.map(ch => {
                let val = periodData.reduce((sum, d) => {
                    let v = 0;
                    if (state.filterProduct === 'กาแฟ') {
                        if (ch.key === 'online') v = d.onlineCoffee || 0;
                        else if (ch.key === 'van') v = d.vanCoffee || 0;
                        else if (ch.key === 'fried') v = 0;
                        else v = d[ch.key] || 0;
                    } else if (state.filterProduct === 'เห็ด') {
                        if (ch.key === 'online') v = d.onlineMushroom || 0;
                        else if (ch.key === 'van') v = d.vanMushroom || 0;
                        else if (ch.key === 'fried') v = d.fried || 0;
                        else v = 0;
                    } else {
                        v = d[ch.key] || 0;
                    }
                    return sum + v;
                }, 0);
                return { name: ch.label, value: val };
            }).filter(seg => seg.value > 0);
        }

        function getDynamicInsight(stats) {
            const achieve = (stats.total / (stats.target || 1)) * 100;
            if (achieve >= 100) return `ผลงานงวดล่าสุด ${state.filterPeriod} ทำยอดได้ทะลุเป้าหมายที่ ${achieve.toFixed(1)}% เป็นผลจากความแข็งแกร่งของทุกช่องทางครับ`;
            return `งวด ${state.filterPeriod} ทำยอดได้ ${formatFull(stats.total)} ฿ ต่ำกว่าเป้าเล็กน้อย แนะนำเร่งกิจกรรมส่งเสริมการขายครับ`;
        }

        // --- 4. UI RENDERERS ---
        function renderStatCard(title, value, sub, color = "red", icon = "activity", isM = true) {
            const colorClass = color === "green" ? "text-green-600 bg-green-50" : "text-red-600 bg-red-50";
            const display = isM ? formatM(value) : value;
            return `
                <div class="bg-white p-4 border border-red-100 shadow-sm flex flex-col justify-between hover:shadow-md transition-all h-full animate-up">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${title}</div>
                            <div class="text-xl font-black text-slate-900 my-1">${display}</div>
                        </div>
                        <div class="p-2 rounded-xl ${colorClass}"><i data-lucide="${icon}" class="w-4 h-4"></i></div>
                    </div>
                    <div class="mt-2 text-[10px] text-slate-400 font-medium">${sub}</div>
                </div>`;
        }

        function generateChannelTable(isFull = false) {
            const tdCls = isFull ? "p-4 text-base border-b" : "p-3 text-[11px]";
            const headers = salesData.map(m => `<th class="${tdCls} text-center font-black border-l border-slate-700 bg-slate-900 text-white">${m.month}</th>`).join('');
            let rows = channelsDef.map(ch => {
                let cells = salesData.map(m => `<td class="${tdCls} text-center font-bold border-l border-slate-100 text-slate-950 bg-white">${formatM(m[ch.key])}</td>`).join('');
                let total = salesData.reduce((s,d)=>s+(d[ch.key]||0), 0);
                return `<tr><td class="${tdCls} font-black text-slate-950 sticky-col bg-white">${ch.label}</td>${cells}<td class="${tdCls} text-center font-black text-red-600 sticky-right bg-slate-50">${formatM(total)}</td></tr>`;
            }).join('');
            return `<div class="full-table-container custom-scrollbar no-round"><table class="w-full text-left border-collapse no-round"><thead><tr><th class="${tdCls} font-black sticky-col uppercase bg-slate-950 text-white z-30">CHANNEL</th>${headers}<th class="${tdCls} text-center sticky-right border-l font-black text-red-400 bg-slate-950 text-white z-30">YTD</th></tr></thead><tbody class="divide-y divide-slate-100">${rows}</tbody></table></div>`;
        }

        function generateProductTable(isFull = false) {
            const tdCls = isFull ? "p-5 text-lg border-b" : "p-3 text-[11px]";
            const headers = salesData.map(m => `<th class="${tdCls} text-center font-black border-l border-slate-700 bg-slate-800 text-white">${m.month}</th>`).join('');
            const cT = salesData.reduce((s,d)=>s+d.coffee, 0); const mT = salesData.reduce((s,d)=>s+d.mushroom, 0);
            return `<div class="full-table-container custom-scrollbar no-round"><table class="w-full text-left border-collapse no-round"><thead><tr><th class="${tdCls} font-black sticky-col bg-slate-950 text-white z-30 uppercase">PRODUCT</th>${headers}<th class="${tdCls} text-center sticky-right border-l font-black text-red-400 bg-slate-950 text-white z-30">YTD TOTAL</th></tr></thead><tbody class="divide-y divide-gray-100"><tr><td class="${tdCls} font-black text-slate-950 sticky-col border-r bg-white">☕ กาแฟ</td>${salesData.map(m => `<td class="${tdCls} text-center font-bold border-l border-slate-50 text-slate-950 bg-white">${formatM(m.coffee)}</td>`).join('')}<td class="${tdCls} text-center font-black text-red-600 sticky-right border-l bg-slate-50 shadow-inner">${formatM(cT)}</td></tr><tr><td class="${tdCls} font-black text-slate-950 sticky-col border-r bg-white">🍄 เห็ดทอด</td>${salesData.map(m => `<td class="${tdCls} text-center font-bold border-l border-slate-50 text-slate-950 bg-white">${formatM(m.mushroom)}</td>`).join('')}<td class="${tdCls} text-center font-black text-red-600 sticky-right border-l bg-slate-50 shadow-inner">${formatM(mT)}</td></tr></tbody></table></div>`;
        }

        // --- 5. WORKSPACE SWITCHER ---
        function switchTab(tabId) {
            state.activeTab = tabId;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            if (tabId === 'sales_dashboard') renderDashboard();
            else if (tabId === 'target') renderTarget();
            else renderLocked();
        }

        function renderDashboard() {
            const stats = getFilteredStats();
            const ytdActual = salesData.reduce((s,d)=>s+d.total, 0);
            const progress = (ytdActual / 100000000) * 100;
            
            document.getElementById('main-content').innerHTML = `
                <div class="flex flex-col space-y-5 animate-up relative">
                    <div class="sticky top-0 z-40 bg-white/80 backdrop-blur-md py-4 px-4 border shadow-sm flex items-center justify-between -mx-2">
                        <div class="flex items-center gap-2 bg-gray-100/50 p-1.5 border border-gray-100">
                            <select onchange="state.filterPeriod=this.value; renderDashboard()" class="bg-white text-[12px] font-black text-red-600 outline-none px-4 py-1.5 border shadow-sm cursor-pointer"><option ${state.filterPeriod==='ปี 69'?'selected':''}>ปี 69</option><option ${state.filterPeriod==='Q1'?'selected':''}>Q1</option>${salesData.map(m => `<option ${state.filterPeriod===m.month?'selected':''}>${m.month}</option>`).join('')}</select>
                            <div class="w-px h-6 bg-gray-300 mx-1"></div>
                            <select onchange="state.filterProduct=this.value; renderDashboard()" class="bg-white text-[12px] font-bold text-slate-600 outline-none px-4 py-1.5 border shadow-sm cursor-pointer"><option ${state.filterProduct==='กาแฟ+เห็ด'?'selected':''}>กาแฟ+เห็ด</option><option ${state.filterProduct==='กาแฟ'?'selected':''}>กาแฟ</option><option ${state.filterProduct==='เห็ด'?'selected':''}>เห็ด</option></select>
                            <div class="w-px h-6 bg-gray-300 mx-1"></div>
                            <select onchange="state.filterChannel=this.value; renderDashboard()" class="bg-white text-[12px] font-bold text-slate-600 outline-none px-4 py-1.5 border shadow-sm cursor-pointer"><option>ทั้งหมด</option>${channelsDef.map(c => `<option ${state.filterChannel===c.label?'selected':''}>${c.label}</option>`).join('')}</select>
                        </div>
                        <div class="text-[11px] font-black text-slate-400 bg-slate-50 px-4 py-2 border">YTD ACTUAL: ${formatFull(ytdActual)} ฿</div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${renderStatCard("ยอดสะสมจริง (69)", ytdActual, "Actual YTD Sales", "green", "activity")}
                        ${renderStatCard("เป้าหมายรวม 69", 100000000, "Fixed 100M Goal", "red", "target")}
                        ${renderStatCard("Achievement", progress.toFixed(2) + "%", "Overall Progress", "red", "trending-up", false)}
                        ${renderStatCard("YoY Growth", "38.4%", "vs 2568 Historical", "green", "arrow-up-right", false)}
                        ${renderStatCard(`ยอดขาย ${state.filterPeriod}`, stats.total, state.filterChannel, "red", "shopping-cart")}
                        ${renderStatCard(`กาแฟจริง (${state.filterPeriod})`, stats.coffee, state.filterChannel, "red", "coffee")}
                        ${renderStatCard(`เห็ดจริง (${state.filterPeriod})`, stats.mushroom, state.filterChannel, "red", "package")}
                        ${renderStatCard(`เป้าหมาย (${state.filterPeriod})`, stats.target, state.filterChannel, "red", "check-circle-2")}
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                        <div class="bg-white p-5 border border-red-50 h-80 shadow-sm relative"><div class="flex justify-between items-center mb-4"><h4 class="text-xs font-black text-red-600 uppercase tracking-widest">ภาพรวมรายปี</h4><i data-lucide="maximize-2" class="w-4 h-4 cursor-pointer text-slate-300 hover:text-red-600" onclick="expandView('yearlyChart')"></i></div><div class="h-60"><canvas id="yearlyChartId"></canvas></div></div>
                        <div class="bg-white p-5 border border-red-50 h-80 shadow-sm relative"><div class="flex justify-between items-center mb-4"><h4 class="text-xs font-black text-red-600 uppercase tracking-widest">Trend รายเดือน</h4><i data-lucide="maximize-2" class="w-4 h-4 cursor-pointer text-slate-300 hover:text-red-600" onclick="expandView('trendChart')"></i></div><div class="h-60"><canvas id="trendChartId"></canvas></div></div>
                        <div class="bg-white p-5 border border-red-50 h-80 shadow-sm relative"><div class="flex justify-between items-center mb-4"><h4 class="text-xs font-black text-red-600 uppercase tracking-widest text-slate-900 underline underline-offset-4">Market Share (Sync)</h4><i data-lucide="maximize-2" class="w-4 h-4 cursor-pointer text-slate-300 hover:text-red-600" onclick="expandView('shareChart')"></i></div><div class="h-60"><canvas id="shareChartId"></canvas></div></div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        <div class="bg-white border border-slate-200 shadow-sm overflow-hidden group no-round"><div class="bg-red-600 p-4 text-white text-[11px] font-black uppercase flex justify-between items-center tracking-widest">ยอดขายรายช่องทาง (M) <i data-lucide="maximize-2" class="w-4 h-4 cursor-pointer opacity-50 hover:opacity-100" onclick="expandView('channelTable')"></i></div><div class="overflow-x-auto">${generateChannelTable(false)}</div></div>
                        <div class="bg-white border border-slate-200 shadow-sm overflow-hidden group no-round"><div class="bg-gray-800 p-4 text-white text-[11px] font-black uppercase flex justify-between items-center tracking-widest">วิเคราะห์รายสินค้า (M) <i data-lucide="maximize-2" class="w-4 h-4 cursor-pointer opacity-50 hover:opacity-100" onclick="expandView('productTable')"></i></div><div class="overflow-x-auto">${generateProductTable(false)}</div></div>
                    </div>
                </div>`;
            lucide.createIcons();
            initDashboardCharts();
        }

        function renderTarget() {
            const totalActual = salesData.reduce((s, m) => s + (m.total || 0), 0);
            document.getElementById('main-content').innerHTML = `
                <div class="space-y-6 animate-up pb-10">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${renderStatCard("เป้าหมายรายปี", 100000000, "Fixed Goal", "red", "target")}
                        ${renderStatCard("ยอดสะสมจริง", totalActual, "Actual YTD", "green", "activity")}
                        ${renderStatCard("Achievement", ((totalActual/100000000)*100).toFixed(2) + "%", "Progress", "red", "trending-up", false)}
                        ${renderStatCard("Gap", 100000000 - totalActual, "Target Remains", "red", "wallet")}
                    </div>
                    <div class="bg-white border border-slate-200 shadow-sm overflow-hidden no-round">
                        <div class="bg-slate-900 p-5 text-white font-black uppercase text-xs tracking-widest flex items-center gap-3 no-round"><i data-lucide="calendar" class="w-4 h-4 text-red-500"></i> Monthly Target Matrix 2569</div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse text-[10px] no-round">
                                <thead class="bg-slate-900 text-white">
                                    <tr>
                                        <th class="p-4 font-black sticky-col bg-slate-900 min-w-[70px]">MONTH</th>
                                        ${channelsDef.map(ch => `<th class="p-4 text-center border-l border-slate-700 font-bold uppercase">${ch.label}<br><span class="text-[8px] text-slate-400 font-medium">จริง / เป้า</span></th>`).join('')}
                                        <th class="p-4 text-center sticky-right font-black text-red-400 bg-slate-900 min-w-[100px]">SUM TARGET</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${salesData.map(m => `
                                        <tr class="hover:bg-red-50/20 transition-all">
                                            <td class="p-4 font-black text-slate-950 sticky-col bg-white border-r">${m.month}</td>
                                            ${channelsDef.map(ch => {
                                                const act = m[ch.key] || 0; const tgt = m[ch.target] || 0;
                                                return `<td class="p-4 text-center border-l bg-white"><div class="font-black ${act >= tgt && act > 0 ? 'text-green-600' : 'text-slate-900'}">${formatFull(act)}</div><div class="text-[9px] text-slate-400 font-bold">${formatFull(tgt)}</div></td>`;
                                            }).join('')}
                                            <td class="p-4 text-center font-bold text-red-700 bg-red-50 sticky-right border-l"><div>${formatFull(m.total)}</div><div class="text-[8px] text-red-300 font-black">${formatFull(m.target)}</div></td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderLocked() {
            document.getElementById('main-content').innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-30 italic"><i data-lucide="lock" class="w-12 h-12 mb-4 text-slate-300"></i><p>Section Locked for Future Update</p></div>`;
            lucide.createIcons();
        }

        // --- 6. CHARTS & MODAL EXPANSION ---
        function initDashboardCharts() {
            try {
                if (window.myCharts.y) window.myCharts.y.destroy();
                if (window.myCharts.t) window.myCharts.t.destroy();
                if (window.myCharts.s) window.myCharts.s.destroy();

                const ctxY = document.getElementById('yearlyChartId').getContext('2d');
                window.myCharts.y = new Chart(ctxY, {
                    type: 'bar',
                    data: { labels: ['ปี 68', 'ปี 69 (จริง)', 'เป้า 100M'], datasets: [{ data: [55720000, salesData.reduce((s,d)=>s+d.total, 0), 100000000], backgroundColor: ['#CBD5E0', PRIMARY_RED, DARK_RED] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => v/1000000 + 'M' } } } }
                });

                const ctxT = document.getElementById('trendChartId').getContext('2d');
                const trendData = salesData.map(m => {
                    const ch = channelsDef.find(c => c.label === state.filterChannel);
                    if (!ch) return (state.filterProduct === 'กาแฟ' ? m.coffee : (state.filterProduct === 'เห็ด' ? m.mushroom : m.total));
                    let val = m[ch.key] || 0;
                    if (state.filterProduct === 'กาแฟ') val = (ch.key === 'online') ? m.onlineCoffee : (ch.key === 'van' ? m.vanCoffee : (['fried'].includes(ch.key) ? 0 : val));
                    if (state.filterProduct === 'เห็ด') val = (ch.key === 'online') ? m.onlineMushroom : (ch.key === 'van' ? m.vanMushroom : (['mt','admin','oem','others'].includes(ch.key) ? 0 : val));
                    return val;
                });

                window.myCharts.t = new Chart(ctxT, {
                    type: 'line',
                    data: { labels: salesData.map(d=>d.month), datasets: [{ data: trendData, borderColor: PRIMARY_RED, tension: 0.4, fill: true, backgroundColor: 'rgba(229, 62, 62, 0.08)' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => v/1000000 + 'M' } } } }
                });

                const shareData = getMarketShareData();
                const ctxS = document.getElementById('shareChartId').getContext('2d');
                window.myCharts.s = new Chart(ctxS, {
                    type: 'doughnut',
                    data: { labels: shareData.map(c=>c.name), datasets: [{ data: shareData.map(c=>c.value), backgroundColor: [PRIMARY_RED, '#F56565', '#FEB2B2', '#CBD5E0', '#FC8181', '#A0AEC0', '#718096'] }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 9, weight: 'bold' } } } } }
                });
            } catch(e) {}
        }

        function expandView(type) {
            const modal = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            const title = document.getElementById('modal-title');
            const sub = document.getElementById('modal-subtitle');
            const stats = getFilteredStats();
            
            modal.classList.remove('hidden');
            sub.innerText = `SYNC STATUS: ${state.filterPeriod} | PRODUCT: ${state.filterProduct}`;

            if (type === 'yearlyChart') {
                title.innerText = "สรุปยอดสะสมปี 2569 vs เป้าหมาย";
                body.innerHTML = `<div class="space-y-12 animate-up"><div class="h-[500px] bg-slate-50 p-10 border shadow-inner"><canvas id="modalChartFull"></canvas></div><div class="bg-white p-10 border-2 border-slate-100 text-slate-950 text-center"><h4 class="font-black text-xl mb-4 text-red-600 uppercase italic">Executive Brief</h4><p class="text-lg leading-relaxed font-bold">"${getDynamicInsight(stats)}"</p></div></div>`;
                setTimeout(() => {
                    new Chart(document.getElementById('modalChartFull').getContext('2d'), {
                        type: 'bar',
                        data: { labels: ['ปี 68', 'ปี 69 (จริง)', 'เป้า 100M'], datasets: [{ data: [55720000, salesData.reduce((s,d)=>s+d.total, 0), 100000000], backgroundColor: ['#CBD5E0', PRIMARY_RED, DARK_RED] }] },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { font: { size: 16, weight: 'bold' }, color: '#000' } }, x: { ticks: { font: { size: 24, weight: 'black' }, color: '#000' } } } }
                    });
                }, 100);
            } else if (type === 'trendChart') {
                title.innerText = "วิเคราะห์แนวโน้มรายเดือน (Trend Analysis)";
                body.innerHTML = `<div class="space-y-12 animate-up"><div class="h-[500px] bg-white p-12 border shadow-2xl"><canvas id="modalTrendId"></canvas></div><div class="bg-slate-50 p-10 text-center font-bold text-slate-700 italic border shadow-sm text-2xl">"การเติบโตเดือน เม.ย. แข็งแกร่งที่สุดในรอบปี 2569 ขับเคลื่อนโดยออนไลน์ครับ"</div></div>`;
                setTimeout(() => {
                    const tVals = salesData.map(d=>d.total);
                    new Chart(document.getElementById('modalTrendId').getContext('2d'), {
                        type: 'line',
                        data: { labels: salesData.map(d=>d.month), datasets: [{ data: tVals, borderColor: PRIMARY_RED, fill: true, backgroundColor: 'rgba(229, 62, 62, 0.1)', tension: 0.4, borderWidth: 8 }] },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { font: { size: 16, weight: 'bold' }, color: '#000' } }, x: { ticks: { font: { size: 18, weight: 'bold' }, color: '#000' } } } }
                    });
                }, 100);
            } else if (type === 'shareChart') {
                title.innerText = "ส่วนแบ่ง Market Share (Dynamic Filter)";
                const mData = getMarketShareData();
                body.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center h-full animate-up"><div class="bg-white p-12 border h-[600px] flex items-center shadow-2xl"><canvas id="modalShareId"></canvas></div><div class="space-y-6"><h4 class="font-black text-5xl text-slate-950 uppercase tracking-tighter mb-10 decoration-red-600 decoration-8 underline underline-offset-8">Channel Analysis</h4>${mData.map(c => `<div class="flex justify-between p-8 bg-white border border-slate-100 rounded-[40px] shadow-sm font-black text-3xl text-slate-950"><span>${c.name}</span><span class="text-red-600">${formatFull(c.value)} ฿</span></div>`).join('')}</div></div>`;
                setTimeout(() => {
                    new Chart(document.getElementById('modalShareId').getContext('2d'), {
                        type: 'doughnut',
                        data: { labels: mData.map(c=>c.name), datasets: [{ data: mData.map(c=>c.value), backgroundColor: [PRIMARY_RED, '#F56565', '#FEB2B2', '#CBD5E0', '#FC8181', '#A0AEC0', '#718096'] }] },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { font: { size: 18, weight: 'black' }, color: '#000' } } } }
                    });
                }, 100);
            } else if (type === 'channelTable') {
                title.innerText = "รายงานยอดขายรายช่องทาง 12 เดือนเต็ม";
                body.innerHTML = `<div class="space-y-12 animate-up"><div class="p-1 bg-white border-2 border-slate-100 shadow-2xl">${generateChannelTable(true)}</div><div class="bg-slate-50 p-10 border-l-[12px] border-slate-300 text-slate-600 text-xl font-medium italic">"วิเคราะห์ความเสถียรของช่องทางสอดคล้องกับพฤติกรรมผู้บริโภครายไตรมาสครับ"</div></div>`;
            } else if (type === 'productTable') {
                title.innerText = "วิเคราะห์ยอดขายแยกตามสินค้า 12 เดือนเต็ม";
                body.innerHTML = `<div class="space-y-12 animate-up"><div class="p-1 bg-white border-2 border-slate-100 shadow-2xl">${generateProductTable(true)}</div><div class="bg-slate-50 p-10 border-l-[12px] border-slate-300 text-slate-600 text-xl font-medium italic">"Product Mix ยังคงรักษาความสมดุล โดยมีกาแฟเป็นสินค้าพระเอกหลักครับ"</div></div>`;
            }
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
        
        function showToast(title, msg, color) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-bg').className = `flex items-center gap-5 px-8 py-5 bg-${color}-600 border-${color}-400 text-white rounded-[30px] shadow-2xl border-2`;
            toast.classList.remove('hidden', 'translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); setTimeout(()=>toast.classList.add('hidden'), 500); }, 5000);
        }

        function resetData() { window.location.reload(); }

        async function handleFileUpload(event) {
            const files = event.target.files; if (!files.length) return;
            showToast("SUCCESS", `จัดการข้อมูลเรียบร้อย`, "green");
            switchTab('sales_dashboard');
        }

        window.onload = () => switchTab('sales_dashboard');
    </script>
</body>
</html>
